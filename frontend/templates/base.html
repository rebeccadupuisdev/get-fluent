<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Fluent</title>
  <link rel="icon" type="image/x-icon" href="/static/favicons/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicons/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/favicons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/favicons/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/static/favicons/android-chrome-512x512.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"DM Serif Display"', 'serif'],
            mono: ['"DM Mono"', 'monospace'],
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  {% if csrf_token is defined %}
  <meta name="csrf-token" content="{{ csrf_token }}">
  <script>
    document.addEventListener('htmx:configRequest', function(evt) {
      const meta = document.querySelector('meta[name="csrf-token"]');
      if (meta && meta.content) evt.detail.headers['X-CSRF-Token'] = meta.content;
    });
  </script>
  {% endif %}
  <style>
    /* Override browser autofill — shared by login, tag modal, etc. */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px rgb(13 48 44) inset;
      -webkit-text-fill-color: rgb(204 251 241);
      caret-color: rgb(204 251 241);
      transition: background-color 5000s ease-in-out 0s;
    }
  </style>
</head>
<body class="h-full bg-stone-800 text-stone-100 antialiased">
  {% block content %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
