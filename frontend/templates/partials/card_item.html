<div class="card-item group relative flex flex-col gap-2 bg-stone-700 border border-stone-600
            rounded-xl px-5 py-4 transition-all duration-150 select-none
            {% if card.audio_filename %}cursor-pointer{% endif %}
            hover:border-teal-500 hover:shadow-[0_4px_28px_rgba(45,212,191,0.12)] hover:-translate-y-0.5"
     id="card-{{ card.id }}"
     {% if card.audio_filename %}
     onclick="toggleCardAudio('{{ card.id }}', '/static/content/{{ card.audio_filename }}')"
     {% endif %}>

  {# — Action buttons shown on hover — #}
  <div class="absolute top-2.5 right-2.5 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity duration-150">
    <button class="w-[26px] h-[26px] flex items-center justify-center rounded-md
                   border border-stone-600 bg-stone-600/80 text-stone-400 text-[11px]
                   hover:border-teal-500 hover:text-teal-400 transition-all duration-150"
            onclick="event.stopPropagation()"
            title="Edit">
      ✎
    </button>
    <button class="w-[26px] h-[26px] flex items-center justify-center rounded-md
                   border border-stone-600 bg-stone-600/80 text-stone-400 text-[11px]
                   hover:border-red-400 hover:text-red-400 transition-all duration-150"
            onclick="event.stopPropagation()"
            hx-delete="/cards/{{ card.id }}"
            hx-target="closest .card-item"
            hx-swap="outerHTML"
            title="Delete">
      ✕
    </button>
  </div>

  {# — Phrase — #}
  <p class="font-serif text-[1.2rem] leading-snug text-stone-100 word-break">{{ card.phrase }}</p>

  {# — Tags — #}
  {% if card.tag_slugs %}
  <div class="flex flex-wrap gap-1.5 mt-1">
    {% for slug in card.tag_slugs %}
    <span class="inline-flex items-center gap-1.5 font-mono text-xs px-2.5 py-0.5 rounded-full
                 bg-teal-950/60 text-teal-400 border border-teal-800/50 whitespace-nowrap">
      <svg class="w-2.5 h-2.5 shrink-0 opacity-90" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor">
        <path fill-rule="evenodd" d="M4.5 2A2.5 2.5 0 0 0 2 4.5v2.879a2.5 2.5 0 0 0 .732 1.767l4.5 4.5a2.5 2.5 0 0 0 3.536 0l2.878-2.878a2.5 2.5 0 0 0 0-3.536l-4.5-4.5A2.5 2.5 0 0 0 7.38 2H4.5ZM5 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd" />
      </svg>
      {{ slug }}
    </span>
    {% endfor %}
  </div>
  {% endif %}

  {# — No audio indicator — #}
  {% if not card.audio_filename %}
  <span class="font-mono text-[0.68rem] text-stone-600 italic mt-1">no audio attached</span>
  {% endif %}

</div>
