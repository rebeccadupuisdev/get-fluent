{# Confirm Delete Empty Tags modal — warns before removing tags with no cards. #}
<div id="confirm-delete-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeConfirmDeleteModal()"></div>
  <div class="relative bg-stone-900 border border-stone-700/60 rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden">

    <div class="flex items-start justify-between px-7 pt-6 pb-5">
      <div class="flex items-center gap-3">
        <span class="text-amber-500 shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
          </svg>
        </span>
        <h2 class="font-serif text-2xl text-amber-400">Delete empty tags?</h2>
      </div>
      <button onclick="closeConfirmDeleteModal()"
              class="w-8 h-8 rounded-lg bg-stone-800 hover:bg-stone-700 text-stone-500
                     hover:text-stone-200 flex items-center justify-center transition-colors mt-0.5 shrink-0">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <p class="px-7 pb-6 font-mono text-sm text-stone-400 leading-relaxed">
      All tags not attached to any card will be permanently removed. This cannot be undone.
    </p>

    <div class="px-7 py-4 border-t border-stone-700/60 flex items-center justify-end gap-2">
      <button type="button" onclick="closeConfirmDeleteModal()"
              class="px-4 py-2 rounded-lg font-mono text-sm bg-stone-800 hover:bg-stone-700
                     text-stone-400 hover:text-stone-200 transition-colors">
        Cancel
      </button>
      <button type="button"
              hx-delete="/tags/empty"
              hx-target="#modal-form-content"
              hx-swap="outerHTML"
              hx-indicator="#htmx-indicator"
              hx-on::after-request="if(event.detail.successful){ closeConfirmDeleteModal(); }"
              class="px-4 py-2 rounded-lg font-mono text-sm bg-amber-700 hover:bg-amber-600
                     text-white transition-colors">
        Delete
      </button>
    </div>

  </div>
</div>
