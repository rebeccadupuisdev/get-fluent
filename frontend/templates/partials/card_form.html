<form class="flex flex-col gap-4 bg-stone-700 border border-stone-600 rounded-xl px-5 py-4"
      hx-post="/cards"
      hx-target="#card-list"
      hx-swap="afterbegin"
      hx-encoding="multipart/form-data"
      hx-on::after-request="if(event.detail.successful){ this.reset(); }"
      hx-disabled-elt="find button[type='submit']">

  <h2 class="text-xs font-semibold uppercase tracking-widest text-stone-400">New card</h2>

  <textarea name="phrase"
            placeholder="Phrase…"
            rows="2"
            required
            class="bg-stone-800 border border-stone-600 rounded-lg px-3 py-2 text-stone-100
                   placeholder-stone-500 text-sm focus:outline-none focus:border-teal-500
                   resize-none transition-colors"></textarea>

  {% if tags %}
  <fieldset class="flex flex-col gap-1.5">
    <legend class="text-xs text-stone-400 mb-1">Tags</legend>
    <div class="flex flex-wrap gap-x-4 gap-y-1.5">
      {% for tag in tags %}
      <label class="flex items-center gap-1.5 text-sm text-stone-300 cursor-pointer
                    hover:text-teal-300 transition-colors">
        <input type="checkbox" name="tag_slugs" value="{{ tag.slug }}"
               class="accent-teal-500 rounded">
        {{ tag.name }}
      </label>
      {% endfor %}
    </div>
  </fieldset>
  {% endif %}

  <div class="flex flex-col gap-1">
    <label class="text-xs text-stone-400">Audio <span class="text-stone-600">(optional)</span></label>
    <input type="file" name="audio" accept="audio/*"
           class="text-sm text-stone-400
                  file:mr-3 file:py-1 file:px-3 file:rounded file:border-0
                  file:bg-stone-600 file:text-stone-200 file:text-xs
                  hover:file:bg-stone-500 file:transition-colors file:cursor-pointer">
  </div>

  <div class="flex justify-end">
    <button type="submit"
            class="px-4 py-2 rounded-lg bg-teal-600 hover:bg-teal-500 text-white
                   text-sm font-medium transition-colors shadow-sm">
      Add card
    </button>
  </div>

</form>
