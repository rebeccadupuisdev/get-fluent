<div class="relative">
  <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-stone-600 pointer-events-none"
       fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0Z"/>
  </svg>
  <input type="hidden" id="active-tag-slug" name="tag_slug" value="">
  <input type="text"
         id="search-input"
         name="q"
         placeholder="Search phrases…"
         autocomplete="off"
         hx-get="/cards"
         hx-trigger="input changed delay:300ms"
         hx-target="#card-list"
         hx-swap="outerHTML"
         hx-include="#active-tag-slug"
         hx-indicator="#htmx-indicator"
         oninput="document.getElementById('search-clear').classList.toggle('hidden', !this.value)"
         class="font-mono bg-stone-700/50 border border-stone-700 rounded-lg pl-9 pr-8 py-2 text-sm
                text-stone-200 placeholder-stone-600
                focus:outline-none focus:border-teal-600/80 focus:ring-1 focus:ring-teal-600/30
                w-52 transition-all focus:w-64">
  <button id="search-clear"
          type="button"
          onclick="const i = document.getElementById('search-input'); i.value = ''; this.classList.add('hidden'); htmx.trigger(i, 'input');"
          class="hidden absolute right-2.5 top-1/2 -translate-y-1/2 text-stone-500 hover:text-stone-300 transition-colors cursor-pointer">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
</div>
