<div class="relative">
  <input type="search"
         name="q"
         placeholder="Search cards…"
         autocomplete="off"
         hx-get="/cards"
         hx-trigger="input changed delay:300ms, search"
         hx-target="#card-list"
         hx-swap="outerHTML"
         class="w-full bg-stone-700 border border-stone-600 rounded-xl px-4 py-2.5
                text-stone-100 placeholder-stone-500 text-sm
                focus:outline-none focus:border-teal-500 transition-colors">
</div>
