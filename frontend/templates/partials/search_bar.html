<div class="relative">
  <input type="text"
         id="search-input"
         name="q"
         placeholder="Search cards…"
         autocomplete="off"
         hx-get="/cards"
         hx-trigger="input changed delay:300ms"
         hx-target="#card-list"
         hx-swap="outerHTML"
         oninput="document.getElementById('search-clear').classList.toggle('hidden', !this.value)"
         class="w-full bg-stone-700 border border-stone-600 rounded-xl px-4 pr-8 py-2.5
                text-stone-100 placeholder-stone-500 text-sm
                focus:outline-none focus:border-teal-500 transition-colors">
  <button id="search-clear"
          type="button"
          onclick="const i = document.getElementById('search-input'); i.value = ''; this.classList.add('hidden'); htmx.trigger(i, 'input');"
          class="hidden absolute right-2.5 top-1/2 -translate-y-1/2 text-stone-500 hover:text-stone-300 transition-colors cursor-pointer">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
</div>
